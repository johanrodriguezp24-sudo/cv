<!DOCTYPE html>
<html>
<head>
<title>Formulario de Inscripción</title>

<style>

body{
    font-family: 'Times New Roman', Times, serif;
    background:white;
}

.container{
    width:600px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

label{
    display:block;
    margin-top:12px;
}

input, select{
    width:95%;
    padding:8px;
    margin-top:5px;
}

.hobbies{
    width:auto;
}

button{
    margin-top:20px;
    padding:10px;
    width:100%;
    background:blue;
    color:white;
    border:none;
    font-size:16px;
}

button:hover{
    background:blue;
}

</style>

</head>

<body>

<div class="container">

<h2>Formulario de Inscripción</h2>

<form>

<label>Tipo de documento</label>
<select required>
<option value="">Seleccione</option>
<option>Cédula de ciudadanía</option>
<option>Tarjeta de identidad</option>
<option>Cédula extranjera</option>
<option>Pasaporte</option>
</select>

<label>Número de documento</label>
<input type="text" pattern="[0-9]{6,12}" required
title="Debe contener entre 6 y 12 números">

<label>Nombres</label>
<input type="text" minlength="3" maxlength="64"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]{3,64}" required
title="Entre 3 y 64 caracteres, solo letras">

<label>Apellidos</label>
<input type="text" minlength="3" maxlength="64"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]{3,64}" required
title="Entre 3 y 64 caracteres, solo letras">

<label>Dirección</label>
<input type="text" required>

<label>Teléfono celular</label>
<input type="tel" pattern="[0-9]{10}" required
title="Debe tener 10 números">

<label>Correo electrónico</label>
<input type="email"
pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
required
title="Debe contener @ y dominio válido">

<label>Usuario</label>
<input type="text" minlength="5" maxlength="20"
pattern="[A-Za-z0-9_]{5,20}" required
title="Entre 5 y 20 caracteres, letras o números">

<label>Password</label>
<input type="password"
pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[._\-]).{8,}"
required
title="Debe tener mínimo 8 caracteres, mayúscula, minúscula, número y símbolo (. _ -)">

<label>Fecha de inscripción</label>
<input type="date" required>

<label>Hobbies</label>

<label><input class="hobbies" type="checkbox"> Deportes</label>
<label><input class="hobbies" type="checkbox"> Música</label>
<label><input class="hobbies" type="checkbox"> Lectura</label>
<label><input class="hobbies" type="checkbox"> Videojuegos</label>
<label><input class="hobbies" type="checkbox"> Programación</label>

<button type="submit">Registrarse</button>

</form>

</div>

</body>
</html>
